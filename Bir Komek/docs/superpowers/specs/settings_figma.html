<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Bir Kömək - Settings Figma Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 20px; background-color: #E4E4E7; display: flex; justify-content: center;">

  <div style="width: 393px; min-height: 852px; background-color: #F4F4F5; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 40px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-radius: 30px; overflow: hidden; position: relative;">
    
    <!-- Header Section -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background-color: #F4F4F5; box-sizing: border-box; position: relative; height: 60px;">
      <!-- Back Arrow -->
      <div style="position: relative; z-index: 2; cursor: pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </div>
      <!-- Centered Title -->
      <div style="position: absolute; left: 0; right: 0; top: 0; bottom: 0; display: flex; justify-content: center; align-items: center; z-index: 1; pointer-events: none;">
        <div style="font-size: 20px; font-weight: 800; color: #111827;">Tənzimləmələr</div>
      </div>
      <!-- Empty space to align center -->
      <div style="width: 24px; z-index: 2;"></div>
    </div>

    <!-- Scroll Container -->
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box;">

      <!-- Profile Details Card -->
      <div style="background-color: #FFFFFF; border-radius: 20px; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #E4E4E7; box-sizing: border-box;">
        <div style="width: 64px; height: 64px; border-radius: 32px; overflow: hidden; background-color: #F3F4F6;">
          <img src="https://placehold.co/128x128" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
        <div style="font-size: 18px; font-weight: 700; color: #111827; font-family: 'Plus Jakarta Sans';">Rüfət Rəşidov</div>
        
        <div style="background-color: #2563EB; border-radius: 10px; padding: 8px 14px; display: flex; align-items: center; gap: 6px; cursor: pointer;">
          <div style="color: #FFFFFF; font-size: 13px; font-weight: 600; font-family: 'Plus Jakarta Sans';">Birkömək Kod: 3597978</div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </div>
      </div>

      <!-- General Section Card -->
      <div style="background-color: #FFFFFF; border-radius: 20px; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; border: 1px solid #E4E4E7; box-sizing: border-box;">
        <div style="font-size: 20px; font-weight: 800; color: #111827; font-family: 'Plus Jakarta Sans'; margin-bottom: 2px;">General</div>

        <!-- Row 1: Tənzimləmələr -->
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background-color: #F4F4F5; display: flex; justify-content: center; align-items: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div style="font-size: 15px; font-weight: 600; color: #111827; font-family: 'Plus Jakarta Sans';">Tənzimləmələr</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <!-- Row 2: Dəstək -->
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background-color: #F4F4F5; display: flex; justify-content: center; align-items: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div style="font-size: 15px; font-weight: 600; color: #111827; font-family: 'Plus Jakarta Sans';">Dəstək</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <!-- Row 3: Məxfilik siyasəti -->
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background-color: #F4F4F5; display: flex; justify-content: center; align-items: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div style="font-size: 15px; font-weight: 600; color: #111827; font-family: 'Plus Jakarta Sans';">Məxfilik siyasəti</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <!-- Row 4: Tez-tez verilən suallar (Fixed FAQ Icon) -->
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background-color: #F4F4F5; display: flex; justify-content: center; align-items: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div style="font-size: 15px; font-weight: 600; color: #111827; font-family: 'Plus Jakarta Sans';">Tez-tez verilən suallar</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

      </div>

      <!-- Logout Card -->
      <div style="background-color: #FFFFFF; border-radius: 20px; padding: 16px; border: 1px solid #E4E4E7; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background-color: #F4F4F5; display: flex; justify-content: center; align-items: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
            <div style="font-size: 15px; font-weight: 600; color: #E11D48; font-family: 'Plus Jakarta Sans';">Çıxış</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
