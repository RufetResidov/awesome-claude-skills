<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Bir Kömək - SOS Media Report & Camera Figma Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 20px; background-color: #E4E4E7; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">

  <!-- View 1: Default Welcome View (Image 1) -->
  <div style="width: 393px; min-height: 852px; background-color: #F4F4F5; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 20px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; position: relative;">
    
    <!-- Header Section -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; box-sizing: border-box; height: 60px; background-color: #FFFFFF; border-bottom: 1px solid #E4E4E7;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <div style="font-size: 20px; font-weight: 800; color: #111827;">Birkömək</div>
      <div style="width: 24px;"></div>
    </div>

    <!-- Welcome Content -->
    <div style="padding: 40px 24px; flex: 1; display: flex; flex-direction: column; gap: 10px;">
      <div style="font-size: 20px; font-weight: 700; color: #2563EB;">Salam, Rüfət!</div>
      <div style="font-size: 30px; font-weight: 800; color: #111827; lineHeight: 38px;">Mən Birkömək, sizə necə dəstək ola bilərəm?</div>
    </div>

    <!-- Bottom Input Editor Container -->
    <div style="padding: 16px; background-color: #FFFFFF; border-top: 1px solid #F3F4F6; box-sizing: border-box;">
      <!-- Blue Input Box -->
      <div style="border: 1.5px solid #2563EB; border-radius: 24px; padding: 12px; background-color: #FFFFFF; min-height: 140px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div style="font-size: 15px; color: #9CA3AF; line-height: 22px; font-family: 'Plus Jakarta Sans'; flex: 1;">Probleminizi qeyd edin .</div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
          <!-- Plus Icon button -->
          <div style="width: 40px; height: 40px; border-radius: 20px; background-color: #EEF2FF; display: flex; justify-content: center; align-items: center; cursor: pointer;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          
          <div style="display: flex; gap: 8px; align-items: center;">
            <!-- Mic Icon button -->
            <div style="width: 40px; height: 40px; border-radius: 20px; background-color: #EEF2FF; display: flex; justify-content: center; align-items: center; cursor: pointer;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
            <!-- Upload arrow button -->
            <div style="width: 40px; height: 40px; border-radius: 20px; background-color: #2563EB; display: flex; justify-content: center; align-items: center; cursor: pointer;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
